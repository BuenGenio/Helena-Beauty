# Publishes the Vite `dist/` output to project Pages at:
#   https://<owner>.github.io/<repository>/
# Repo Settings → Pages → Build: GitHub Actions (not “Deploy from branch” with /,
# which would ship this repo’s *source* index.html and break with /src/main.ts).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback (GitHub Pages client-side routes)
        run: cp dist/index.html dist/404.html

      - name: Verify built index (catch branch-deploy / wrong folder mistakes)
        run: |
          if grep -q 'src="/src/main.ts"' dist/index.html; then
            echo "::error::dist/index.html still points at Vite dev entry — use this workflow’s artifact, not repo-root source."
            exit 1
          fi
          if ! grep -qE 'src="/[^"]+/assets/[^"]+\.js"' dist/index.html; then
            echo "::error::dist/index.html missing hashed /assets bundle script."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
